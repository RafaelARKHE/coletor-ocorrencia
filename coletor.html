<!DOCTYPE html>
<!-- sistema: Nexus | tipo: documento_oficial | disciplina: — | sigla: OPS | periodo: — | criado_em: 08/07/2026 | atualizado_em: 08/07/2026 | versao: 1.1 -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Coletor">
<meta name="theme-color" content="#0e0e10">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>Coletor de Ocorrência — Nexus</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
<style>
  /* ============ TOKENS CANÔNICOS NEXUS — mesma paleta/tipografia dos artefatos HTML de estudo.
     Domínio Operacional: âmbar (chrome/estado interativo, nunca significado de conteúdo).
     Semântica de conteúdo (verde/vermelho/amarelo/roxo/rosa/azul) é a mesma de todo o Nexus. */
  :root {
    color-scheme: dark;
    --bg:#0d1112; --panel:#161b1d; --panel2:#1d2427; --line:#2c363a;
    --text:#eef2ef; --sub:#93a19b; --muted:#6c7a75;
    --dominio:#e0692e;
    --verde:#5b9d6e; --vermelho:#b5564a; --amarelo:#b8923a;
    --roxo:#8377ad; --rosa:#b97590; --azul:#5b7fa6;
    --font-leitura:'Source Serif 4',serif;
    --font-interface:'IBM Plex Sans',sans-serif;
    --font-dado:'IBM Plex Mono',monospace;
  }
  * { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: var(--font-interface); background: var(--bg); color: var(--text);
         max-width: 560px; margin: 0 auto; padding: 14px 14px calc(20px + env(safe-area-inset-bottom)); line-height: 1.5; }
  h1 { font-size: 1.1rem; font-weight: 800; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  h1 small { font-family: var(--font-dado); color: var(--sub); font-weight: 500; font-size: .7rem; text-transform: uppercase; letter-spacing: .06em; }
  h2 { font-family: var(--font-dado); font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--dominio); margin: 18px 0 8px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  button { font-family: var(--font-interface); font-size: .95rem; font-weight: 600; padding: 14px 10px; border-radius: 14px; border: 1px solid var(--line);
           background: var(--panel); color: var(--text); text-align: left; width: 100%; transition: .15s; }
  button:active { background: var(--panel2); }
  button:disabled { opacity: .35; }
  button.sel { border-color: var(--dominio); background: var(--panel2); color: var(--dominio); }
  button.primary { background: var(--dominio); border-color: var(--dominio); color: var(--bg); text-align: center; font-weight: 700; }
  button.danger { background: var(--vermelho); border-color: var(--vermelho); color: var(--text); text-align: center; }

  /* ---------- marcos de horário (com exclusão) ---------- */
  .marco { position: relative; border: 1px solid var(--line); border-radius: 14px; background: var(--panel); overflow: hidden; }
  .marco.done { border-color: var(--verde); background: rgba(91,157,110,.14); }
  .marco-tap { text-align: center; font-size: .78rem; font-family: var(--font-dado); padding: 14px 6px; cursor: pointer; overflow-wrap: break-word; }
  .marco.done .marco-tap { color: var(--verde); }
  .marco-tap b { display: block; font-size: 1rem; font-family: var(--font-dado); }
  .marco-del { position: absolute; top: 3px; right: 3px; width: auto; padding: 2px 6px; font-size: .65rem;
               border-radius: 8px; background: var(--panel2); border: 1px solid var(--line); color: var(--sub); }

  /* ---------- slots (cartão expansível, multi-registro) ---------- */
  .slotcard { border: 1px solid var(--line); border-radius: 14px; background: var(--panel); margin-bottom: 8px; overflow: hidden; }
  .slotcard.done { border-color: var(--verde); }
  .slot-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 14px 16px; cursor: pointer; }
  .slot-head small { display: block; color: var(--sub); font-size: .7rem; margin-top: 3px; }
  .slot-head .chk { font-size: .95rem; color: var(--sub); white-space: nowrap; flex: 0 0 auto; }
  .reg-list { padding: 0 10px; }
  .reg-row { display: flex; justify-content: space-between; align-items: center; gap: 8px; padding: 7px 4px; border-bottom: 1px solid var(--line); font-size: .82rem; color: var(--sub); }
  .reg-row span:first-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .reg-row button { width: auto; flex: 0 0 auto; padding: 3px 7px; font-size: .72rem; margin-left: 4px; border-radius: 7px; }
  .reg-vazio { color: var(--muted); font-size: .8rem; padding: 8px 4px; }
  .addrow { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 10px 12px; }
  .addrow button { width: auto; flex: 0 0 auto; padding: 8px 12px; font-size: 1.05rem; border-radius: 10px; text-align: center; }

  #tela-rec { position: fixed; inset: 0; background: rgba(13,17,18,.94); display: none;
              flex-direction: column; justify-content: center; align-items: center; gap: 14px; padding: 24px; z-index: 10; }
  #tela-rec.on { display: flex; }
  #rec-papel { font-family: var(--font-interface); font-size: 1.3rem; font-weight: 800; }
  #rec-guia { font-family: var(--font-leitura); color: var(--sub); font-size: 1rem; text-align: center; line-height: 1.5; max-width: 320px; }
  #rec-timer { font-family: var(--font-dado); font-size: 2.4rem; font-variant-numeric: tabular-nums; color: var(--vermelho); }
  #rec-stop { max-width: 240px; }
  #rec-live { font-family: var(--font-leitura); color: var(--verde); font-size: .85rem; text-align: center; max-height: 4em; overflow: hidden; }
  #rec-nota { width: 100%; max-width: 320px; min-height: 64px; font-family: var(--font-interface); font-size: .92rem; padding: 10px;
              border-radius: 10px; border: 1px solid var(--line); background: var(--panel2); color: var(--text); resize: vertical; }
  #rec-nota::placeholder { color: var(--muted); }

  .lista-audio { font-family: var(--font-dado); font-size: .78rem; color: var(--sub); margin: 4px 0 0 4px; }
  #hist div { padding: 8px 4px; border-bottom: 1px solid var(--line); font-size: .85rem; color: var(--sub); }
  .badge { font-family: var(--font-dado); font-size: .68rem; background: var(--panel2); border-radius: 6px; padding: 1px 6px; color: var(--sub); }
  select, input, textarea { width: 100%; font-family: var(--font-dado); font-size: 1rem; padding: 12px; border-radius: 10px; border: 1px solid var(--line);
                  background: var(--panel2); color: var(--text); margin-bottom: 8px; }
  select:focus, input:focus, textarea:focus { outline: none; border-color: var(--dominio); }
</style>
</head>
<body>
<h1>🚒 Coletor de Ocorrência <small id="estado-app">pronto</small></h1>

<!-- TELA 1: setup -->
<section id="tela-setup">
  <h2>Tipo de ocorrência</h2>
  <div class="grid" id="tipos"></div>
  <h2>Sua função</h2>
  <div class="grid" id="funcoes"></div>
  <h2>Viatura (VTR)</h2>
  <input id="in-vtr" placeholder="ex.: AR-132" autocapitalize="characters">
  <button class="primary" id="b-iniciar" disabled>▶️ Iniciar ocorrência</button>
  <h2>Ocorrências concluídas neste aparelho</h2>
  <div id="hist"></div>
</section>

<!-- TELA 2: cockpit -->
<section id="tela-cockpit" hidden>
  <h2>Marcos de horário — toque no momento exato</h2>
  <div class="grid" style="grid-template-columns:1fr 1fr 1fr" id="marcos"></div>
  <h2>Coleta — toque no papel, escolha como registrar</h2>
  <div id="slots"></div>
  <h2>Fechar</h2>
  <button class="primary" id="b-concluir">✅ Concluir ocorrência e exportar pacote</button>
  <button class="danger" id="b-cancelar" style="margin-top:8px">✖️ Descartar ocorrência</button>
</section>

<!-- overlay de gravação -->
<div id="tela-rec">
  <div id="rec-papel"></div>
  <div id="rec-guia"></div>
  <div id="rec-timer">0:00</div>
  <div id="rec-live"></div>
  <textarea id="rec-nota" placeholder="(opcional) digite aqui enquanto fala — redundância para maior fidelidade"></textarea>
  <button class="danger" id="rec-stop">⏹️ Parar gravação</button>
</div>

<script>
'use strict';
/* ================= SCHEMA (cópia embutida de campos_ocorrencia.json) ================= */
const SCHEMA = {
  funcoes: [
    { id: "guarnicao_salvamento", rotulo: "Guarnição de salvamento (AR)" },
    { id: "guarnicao_incendio", rotulo: "Guarnição de incêndio (ABT)" },
    { id: "guarnicao_resgate", rotulo: "Guarnição de resgate/APH (UR)" },
    { id: "outro", rotulo: "Outra função" }
  ],
  papeis: {
    solicitante:  { rotulo: "Solicitante",         campos: ["nome","cpf","contato"] },
    vitima:       { rotulo: "Vítima / Paciente",   campos: ["nome","idade","cpf","estado_vitima","destino"], multiplo: true },
    condutor:     { rotulo: "Condutor envolvido",  campos: ["nome","cpf","veiculo_placa","veiculo_modelo"], multiplo: true },
    testemunha:   { rotulo: "Testemunha",          campos: ["nome","cpf"], multiplo: true },
    proprietario: { rotulo: "Proprietário do bem", campos: ["nome","cpf"] },
    apoio_samu:   { rotulo: "Apoio SAMU",          campos: ["usb_numero","equipe"] },
    apoio_pm:     { rotulo: "Apoio PM",            campos: ["batalhao","vtr_pm","equipe"] },
    apoio_outro:  { rotulo: "Apoio externo",       campos: ["orgao","equipe"], multiplo: true },
    relato:       { rotulo: "Relato do ocorrido",  campos: ["texto_livre"] }
  },
  campos: {
    nome:"Nome completo", cpf:"CPF", idade:"Idade", contato:"Telefone (se houver)",
    estado_vitima:"Estado da vítima (consciente? lesões?)", destino:"Destino/encaminhamento",
    veiculo_placa:"Placa do veículo", veiculo_modelo:"Modelo/cor do veículo",
    usb_numero:"Nº da USB", equipe:"Nomes da equipe", batalhao:"Batalhão (ex.: 37º BPM)",
    vtr_pm:"VTR da PM", orgao:"Órgão/empresa (nomear a instituição)", texto_livre:"O que aconteceu, na ordem"
  },
  tipos: [
    { id:"acidente_transito_com_vitima", rotulo:"🚗 Acidente trânsito c/ vítima", natureza_sinesp:"SINISTRO DE TRÂNSITO",
      papeis:["solicitante","vitima","condutor","testemunha","apoio_samu","apoio_pm","relato"] },
    { id:"incendio_residencia", rotulo:"🏠 Incêndio em edificação", natureza_sinesp:"INCÊNDIO",
      papeis:["solicitante","vitima","proprietario","testemunha","apoio_pm","apoio_outro","relato"] },
    { id:"fogo_veiculo", rotulo:"🚙 Fogo em veículo", natureza_sinesp:"INCÊNDIO",
      papeis:["solicitante","proprietario","testemunha","apoio_pm","relato"] },
    { id:"fogo_poste_fiacao", rotulo:"⚡ Fogo em poste/fiação", natureza_sinesp:"INCÊNDIO",
      papeis:["solicitante","apoio_outro","relato"] },
    { id:"apoio_samu_clinico", rotulo:"🚑 Apoio SAMU", natureza_sinesp:"APOIO",
      papeis:["solicitante","vitima","apoio_samu","apoio_pm","relato"] },
    { id:"salvamento", rotulo:"🛟 Busca e salvamento", natureza_sinesp:"BUSCA E SALVAMENTO",
      papeis:["solicitante","vitima","testemunha","apoio_samu","apoio_pm","relato"] },
    { id:"corte_objetos", rotulo:"💍 Corte de objetos", natureza_sinesp:"CORTE DE OBJETOS",
      papeis:["vitima","relato"] },
    { id:"outra", rotulo:"❓ Outra", natureza_sinesp:null,
      papeis:["solicitante","vitima","testemunha","apoio_samu","apoio_pm","apoio_outro","relato"] }
  ],
  marcos: { deslocamento:"Deslocamento", chegada:"Chegada", termino:"Término" }
};

/* ================= estado + IndexedDB ================= */
const $ = id => document.getElementById(id);
let oc = null;          // ocorrência ativa {id, tipo, funcao, vtr, iniciada_em, marcos:{}, registros:[], concluida}
let db = null;
let expandidos = new Set(); // slots expandidos nesta sessão (não persistido)

function abrirDB() {
  return new Promise((res, rej) => {
    const r = indexedDB.open('coletor_nexus', 2);
    r.onupgradeneeded = () => {
      const d = r.result;
      if (!d.objectStoreNames.contains('ocorrencias')) d.createObjectStore('ocorrencias', { keyPath: 'id' });
      if (!d.objectStoreNames.contains('audios')) d.createObjectStore('audios');   // legado v1, mantido sem uso
      if (!d.objectStoreNames.contains('midia')) d.createObjectStore('midia');     // key: `${ocId}/${arquivo}` → Blob/File
    };
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
const tx = (store, mode) => db.transaction(store, mode).objectStore(store);
const put = (store, val, key) => new Promise((res, rej) => { const q = tx(store,'readwrite').put(val, key); q.onsuccess = () => res(); q.onerror = () => rej(q.error); });
const getAll = store => new Promise((res, rej) => { const q = tx(store,'readonly').getAll(); q.onsuccess = () => res(q.result); q.onerror = () => rej(q.error); });
const getOne = (store, key) => new Promise((res, rej) => { const q = tx(store,'readonly').get(key); q.onsuccess = () => res(q.result); q.onerror = () => rej(q.error); });
const del = (store, key) => new Promise((res, rej) => { const q = tx(store,'readwrite').delete(key); q.onsuccess = () => res(); q.onerror = () => rej(q.error); });

const salvarOc = () => put('ocorrencias', JSON.parse(JSON.stringify(oc)));
const agoraISO = () => new Date().toISOString();
const hhmm = iso => new Date(iso).toTimeString().slice(0,5);
const novoId = () => 'r_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);

function pegarGeo() {
  return new Promise(res => {
    if (!navigator.geolocation) return res(null);
    navigator.geolocation.getCurrentPosition(
      p => res({ lat: +p.coords.latitude.toFixed(6), lon: +p.coords.longitude.toFixed(6), precisao_m: Math.round(p.coords.accuracy) }),
      () => res(null), { enableHighAccuracy: true, timeout: 8000 });
  });
}

/* ================= TELA 1: setup ================= */
let selTipo = null, selFuncao = null;
function renderSetup() {
  $('tipos').innerHTML = SCHEMA.tipos.map(t =>
    `<button data-t="${t.id}" class="${selTipo===t.id?'sel':''}">${t.rotulo}</button>`).join('');
  $('funcoes').innerHTML = SCHEMA.funcoes.map(f =>
    `<button data-f="${f.id}" class="${selFuncao===f.id?'sel':''}">${f.rotulo}</button>`).join('');
  $('tipos').querySelectorAll('button').forEach(b => b.onclick = () => { selTipo = b.dataset.t; renderSetup(); });
  $('funcoes').querySelectorAll('button').forEach(b => b.onclick = () => { selFuncao = b.dataset.f; renderSetup(); });
  $('b-iniciar').disabled = !(selTipo && selFuncao);
}
async function renderHist() {
  const ocs = (await getAll('ocorrencias')).filter(o => o.concluida);
  $('hist').innerHTML = ocs.length ? ocs.map(o =>
    `<div>${o.rotulo_tipo} — ${hhmm(o.iniciada_em)} <span class="badge">${o.registros.length} registros</span>
     <button data-exp="${o.id}" style="width:auto;padding:4px 10px;font-size:.75rem;margin-left:8px">⬇️ re-exportar</button></div>`).join('')
    : '<div style="color:var(--muted)">nenhuma ainda</div>';
  $('hist').querySelectorAll('button').forEach(b => b.onclick = async () => {
    const o = await getOne('ocorrencias', b.dataset.exp); exportarPacote(o);
  });
}

$('b-iniciar').onclick = async () => {
  const tipo = SCHEMA.tipos.find(t => t.id === selTipo);
  oc = { id: 'oc_' + Date.now(), tipo: tipo.id, rotulo_tipo: tipo.rotulo.replace(/^\S+\s/, ''),
         natureza_sinesp: tipo.natureza_sinesp, funcao: selFuncao, vtr: $('in-vtr').value.trim() || null,
         iniciada_em: agoraISO(), marcos: {}, registros: [], concluida: false };
  expandidos = new Set();
  await salvarOc();
  mostrarCockpit();
};

/* ================= TELA 2: cockpit ================= */
function mostrarCockpit() {
  $('tela-setup').hidden = true; $('tela-cockpit').hidden = false;
  $('estado-app').textContent = oc.rotulo_tipo;
  renderMarcos(); renderSlots();
}

function renderMarcos() {
  $('marcos').innerHTML = Object.entries(SCHEMA.marcos).map(([id, rot]) => {
    const t = oc.marcos[id];
    return `<div class="marco ${t?'done':''}">
      <div class="marco-tap" data-m="${id}"><b>${t?hhmm(t.t):'—'}</b>${rot}</div>
      ${t ? `<button class="marco-del" data-m="${id}" title="Limpar marco">✕</button>` : ''}
    </div>`;
  }).join('');
  $('marcos').querySelectorAll('.marco-tap').forEach(el => el.onclick = async () => {
    const id = el.dataset.m;
    if (oc.marcos[id] && !confirm('Já marcado às ' + hhmm(oc.marcos[id].t) + '. Sobrescrever?')) return;
    oc.marcos[id] = { t: agoraISO(), geo: await pegarGeo() };
    await salvarOc(); renderMarcos();
  });
  $('marcos').querySelectorAll('.marco-del').forEach(b => b.onclick = async (e) => {
    e.stopPropagation();
    delete oc.marcos[b.dataset.m];
    await salvarOc(); renderMarcos();
  });
}

/* ================= slots (multi-registro: áudio/texto/foto/vídeo) ================= */
function iconeTipo(t) { return { audio:'🎙️', foto:'📷', video:'🎥', texto:'⌨️' }[t] || '•'; }
function resumoRegistro(r) {
  if (r.tipo === 'audio') return (r.duracao_s||0) + 's' + (r.nota_digitada?' 📝':'') + (r.transcricao_rascunho?' 💬':'');
  if (r.tipo === 'texto') return (r.texto||'').slice(0,44) + ((r.texto||'').length>44 ? '…' : '');
  if (r.tipo === 'foto' || r.tipo === 'video') return r.legenda || (r.tipo === 'foto' ? 'foto' : 'vídeo');
  return '';
}

function renderSlots() {
  const tipo = SCHEMA.tipos.find(t => t.id === oc.tipo);
  $('slots').innerHTML = tipo.papeis.map(pid => {
    const p = SCHEMA.papeis[pid];
    const regs = oc.registros.filter(r => r.slot === pid);
    const ok = regs.length > 0;
    const exp = expandidos.has(pid);
    return `<div class="slotcard ${ok?'done':''}">
      <div class="slot-head" data-p="${pid}">
        <span>${p.rotulo}${p.multiplo?' <span class="badge">+</span>':''}
          <small>${p.campos.map(c => SCHEMA.campos[c]).join(' · ')}</small></span>
        <span class="chk">${ok ? '✅'+(regs.length>1?' ×'+regs.length:'') : '⭕'} ${exp?'▲':'▼'}</span>
      </div>
      ${exp ? `
        <div class="reg-list">
          ${regs.length ? regs.map(r => `<div class="reg-row">
            <span>${iconeTipo(r.tipo)} ${resumoRegistro(r)}</span>
            <span><button class="reg-edit" data-id="${r.id}">✏️</button><button class="reg-del" data-id="${r.id}">🗑️</button></span>
          </div>`).join('') : '<div class="reg-vazio">nada ainda — use os botões abaixo</div>'}
        </div>
        <div class="addrow">
          <button class="add-audio" title="Gravar áudio">🎙️</button>
          <button class="add-texto" title="Digitar nota">⌨️</button>
          <button class="add-foto" title="Tirar foto">📷</button>
          <button class="add-foto-lib" title="Adicionar foto">🖼️</button>
          <button class="add-video" title="Gravar vídeo">🎥</button>
          <button class="add-video-lib" title="Adicionar vídeo">📹</button>
        </div>` : ''}
    </div>`;
  }).join('');

  $('slots').querySelectorAll('.slot-head').forEach(h => h.onclick = () => {
    const pid = h.dataset.p;
    expandidos.has(pid) ? expandidos.delete(pid) : expandidos.add(pid);
    renderSlots();
  });
  $('slots').querySelectorAll('.reg-edit').forEach(b => b.onclick = e => { e.stopPropagation(); editarRegistro(b.dataset.id); });
  $('slots').querySelectorAll('.reg-del').forEach(b => b.onclick = e => { e.stopPropagation(); excluirRegistro(b.dataset.id); });
  $('slots').querySelectorAll('.slotcard').forEach((card, i) => {
    const pid = tipo.papeis[i];
    const set = (cls, fn) => { const el = card.querySelector(cls); if (el) el.onclick = e => { e.stopPropagation(); fn(pid); }; };
    set('.add-audio', gravar);
    set('.add-texto', digitarNota);
    set('.add-foto', pid => capturarMidia(pid, 'foto', true));
    set('.add-foto-lib', pid => capturarMidia(pid, 'foto', false));
    set('.add-video', pid => capturarMidia(pid, 'video', true));
    set('.add-video-lib', pid => capturarMidia(pid, 'video', false));
  });
}

function digitarNota(pid) {
  const p = SCHEMA.papeis[pid];
  const texto = prompt('Digite (' + p.campos.map(c => SCHEMA.campos[c]).join(', ') + '):');
  if (texto === null || !texto.trim()) return;
  oc.registros.push({ id: novoId(), slot: pid, tipo: 'texto', t: agoraISO(), texto: texto.trim(), campos_alvo: p.campos });
  salvarOc(); renderSlots();
}

function extPara(tipo, mime) {
  if (tipo === 'foto') return /png/.test(mime) ? 'png' : 'jpg';
  return /quicktime/.test(mime) ? 'mov' : 'mp4';
}
function capturarMidia(pid, tipo, fromCamera) {
  const p = SCHEMA.papeis[pid];
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = tipo === 'foto' ? 'image/*' : 'video/*';
  if (fromCamera) input.capture = 'environment';
  input.onchange = async () => {
    const file = input.files && input.files[0];
    if (!file) return;
    const geo = await pegarGeo();
    const ext = extPara(tipo, file.type);
    const seq = String(oc.registros.length + 1).padStart(2,'0');
    const arquivo = `midia/${pid}/${seq}_${tipo}_${Date.now()}.${ext}`;
    oc.registros.push({ id: novoId(), arquivo, slot: pid, tipo, t: agoraISO(), geo, mime: file.type, legenda: null, campos_alvo: p.campos });
    await put('midia', file, oc.id + '/' + arquivo);
    await salvarOc(); renderSlots();
  };
  input.click();
}

function editarRegistro(id) {
  const r = oc.registros.find(x => x.id === id);
  if (!r) return;
  if (r.tipo === 'texto') {
    const novo = prompt('Editar nota:', r.texto || '');
    if (novo === null) return;
    r.texto = novo.trim();
  } else if (r.tipo === 'audio') {
    const novo = prompt('Nota digitada (redundância) para este áudio:', r.nota_digitada || '');
    if (novo === null) return;
    r.nota_digitada = novo.trim() || null;
  } else {
    const novo = prompt('Legenda (opcional):', r.legenda || '');
    if (novo === null) return;
    r.legenda = novo.trim() || null;
  }
  salvarOc(); renderSlots();
}

async function excluirRegistro(id) {
  const r = oc.registros.find(x => x.id === id);
  if (!r) return;
  if (!confirm('Excluir este registro (' + r.tipo + ')?')) return;
  if (r.arquivo) await del('midia', oc.id + '/' + r.arquivo);
  oc.registros = oc.registros.filter(x => x.id !== id);
  await salvarOc(); renderSlots();
}

/* ================= gravação de áudio ================= */
let mediaRec = null, chunks = [], timerInt = null, speech = null, speechTxt = '';
async function gravar(pid) {
  const p = SCHEMA.papeis[pid];
  try {
    if (!window.isSecureContext || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      alert('⚠️ Sem HTTPS o iPhone bloqueia o microfone.\n\nAbra o app por um endereço https:// (não como arquivo local nem por IP). Veja as instruções do Nexus.');
      return;
    }
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const mime = ['audio/mp4','audio/webm',''].find(m => m === '' || MediaRecorder.isTypeSupported(m));
    mediaRec = new MediaRecorder(stream, mime ? { mimeType: mime } : undefined);
    chunks = [];
    mediaRec.ondataavailable = e => chunks.push(e.data);
    const t0 = Date.now();
    mediaRec.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      clearInterval(timerInt);
      if (speech) { try { speech.stop(); } catch(e) {} }
      $('tela-rec').classList.remove('on');
      const blob = new Blob(chunks, { type: mediaRec.mimeType });
      if (blob.size === 0) { alert('Gravação vazia — tente de novo.'); return; }
      const notaDigitada = $('rec-nota').value.trim() || null;
      const ext = /mp4|aac/.test(mediaRec.mimeType) ? 'm4a' : 'webm';
      const seq = String(oc.registros.length + 1).padStart(2,'0');
      const arquivo = `midia/${pid}/${seq}_audio_${Date.now()}.${ext}`;
      const geo = await pegarGeo();
      oc.registros.push({ id: novoId(), arquivo, slot: pid, tipo: 'audio', t: agoraISO(), duracao_s: Math.round((Date.now()-t0)/1000),
                          geo, mime: mediaRec.mimeType,
                          transcricao_rascunho: speechTxt.trim() || null,
                          nota_digitada: notaDigitada,
                          campos_alvo: p.campos });
      await put('midia', blob, oc.id + '/' + arquivo);
      await salvarOc(); renderSlots();
    };
    // overlay
    $('rec-papel').textContent = '🎙️ ' + p.rotulo;
    $('rec-guia').textContent = 'Pergunte: ' + p.campos.map(c => SCHEMA.campos[c]).join(' → ');
    $('rec-live').textContent = ''; speechTxt = '';
    $('rec-nota').value = '';
    $('tela-rec').classList.add('on');
    timerInt = setInterval(() => {
      const s = Math.round((Date.now()-t0)/1000);
      $('rec-timer').textContent = Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
    }, 250);
    // transcrição-rascunho opcional (feature-detection; áudio é a verdade)
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      speech = new SR(); speech.lang = 'pt-BR'; speech.continuous = true; speech.interimResults = true;
      speech.onresult = e => { let f=''; for (const r of e.results) if (r.isFinal) f += r[0].transcript + ' ';
                               speechTxt = f; $('rec-live').textContent = f.slice(-160); };
      speech.onerror = () => {}; try { speech.start(); } catch(e) { speech = null; }
    } else speech = null;
    mediaRec.start(1000); // timeslice: iOS entrega dados a cada 1s (sem isso a gravação pode vir vazia)
  } catch (e) { alert('Não consegui acessar o microfone: ' + e.message); }
}
$('rec-stop').onclick = () => mediaRec && mediaRec.state !== 'inactive' && mediaRec.stop();

/* ================= ZIP (store, sem compressão) ================= */
const CRC_TAB = (() => { const t = new Uint32Array(256);
  for (let n=0;n<256;n++){ let c=n; for (let k=0;k<8;k++) c = c&1 ? 0xEDB88320 ^ (c>>>1) : c>>>1; t[n]=c; } return t; })();
const crc32 = u8 => { let c = 0xFFFFFFFF; for (let i=0;i<u8.length;i++) c = CRC_TAB[(c ^ u8[i]) & 0xFF] ^ (c>>>8); return (c ^ 0xFFFFFFFF) >>> 0; };
function zipar(entradas) { // [{nome, dados:Uint8Array}]
  const enc = new TextEncoder(); const locais = []; const centrais = []; let off = 0;
  const u16 = v => [v&255, (v>>8)&255]; const u32 = v => [v&255,(v>>8)&255,(v>>16)&255,(v>>>24)&255];
  for (const e of entradas) {
    const nome = enc.encode(e.nome), crc = crc32(e.dados), n = e.dados.length;
    const loc = new Uint8Array([0x50,0x4b,3,4, ...u16(20), ...u16(0x0800), ...u16(0), ...u16(0), ...u16(0),
                                ...u32(crc), ...u32(n), ...u32(n), ...u16(nome.length), ...u16(0)]);
    locais.push(loc, nome, e.dados);
    centrais.push(new Uint8Array([0x50,0x4b,1,2, ...u16(20), ...u16(20), ...u16(0x0800), ...u16(0), ...u16(0), ...u16(0),
                                  ...u32(crc), ...u32(n), ...u32(n), ...u16(nome.length), ...u16(0), ...u16(0),
                                  ...u16(0), ...u16(0), ...u32(0), ...u32(off)]), nome);
    off += loc.length + nome.length + n;
  }
  const cdLen = centrais.reduce((s,a)=>s+a.length,0);
  const fim = new Uint8Array([0x50,0x4b,5,6, ...u16(0), ...u16(0), ...u16(entradas.length), ...u16(entradas.length),
                              ...u32(cdLen), ...u32(off), ...u16(0)]);
  return new Blob([...locais, ...centrais, fim], { type: 'application/zip' });
}

/* ================= concluir + exportar ================= */
async function exportarPacote(o) {
  const manifest = {
    app_versao: '1.1',
    ocorrencia: { tipo_sugerido: o.tipo, natureza_sinesp: o.natureza_sinesp, funcao_cadete: o.funcao,
                  vtr: o.vtr, iniciada_em: o.iniciada_em, concluida_em: o.concluida_em || null,
                  marcos: o.marcos },
    registros: o.registros,
    aviso_fidelidade: 'transcricao_rascunho e nota_digitada sao auxiliares (on-device / digitados pelo cadete); o audio/midia original e a fonte de verdade em caso de divergencia. Campos finais so apos estruturacao no Nexus (relatorio_ocorrencia).'
  };
  const entradas = [{ nome: 'manifest.json', dados: new TextEncoder().encode(JSON.stringify(manifest, null, 2)) }];
  for (const r of o.registros) {
    if (!r.arquivo) continue; // registros de texto não têm arquivo de mídia
    const blob = await getOne('midia', o.id + '/' + r.arquivo);
    if (blob) entradas.push({ nome: r.arquivo, dados: new Uint8Array(await blob.arrayBuffer()) });
  }
  const d = new Date(o.iniciada_em);
  const stamp = d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0')
              + '-' + String(d.getHours()).padStart(2,'0') + String(d.getMinutes()).padStart(2,'0');
  const zip = zipar(entradas);
  const nomeZip = `pacote_ocorrencia_${stamp}.zip`;
  // compartilhar (iOS: folha de share → Drive/AirDrop) com fallback para download
  const file = new File([zip], nomeZip, { type: 'application/zip' });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try { await navigator.share({ files: [file] }); return; } catch (e) { /* cancelado → fallback */ }
  }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(zip); a.download = nomeZip; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 30000);
}

$('b-concluir').onclick = async () => {
  const faltam = Object.keys(SCHEMA.marcos).filter(m => !oc.marcos[m]);
  const semRegistro = oc.registros.length === 0;
  let msg = '';
  if (faltam.length) msg += 'Marcos sem horário: ' + faltam.join(', ') + '. ';
  if (semRegistro) msg += 'Nenhum registro (áudio/texto/foto/vídeo) feito. ';
  if (msg && !confirm(msg + 'Concluir mesmo assim? (o que faltar vira [A CONFIRMAR] no Nexus)')) return;
  oc.concluida = true; oc.concluida_em = agoraISO();
  await salvarOc();
  await exportarPacote(oc);
  oc = null; selTipo = null; selFuncao = null;
  $('tela-cockpit').hidden = true; $('tela-setup').hidden = false;
  $('estado-app').textContent = 'pronto';
  renderSetup(); renderHist();
};
$('b-cancelar').onclick = async () => {
  if (!confirm('Descartar esta ocorrência e os registros dela?')) return;
  for (const r of oc.registros) if (r.arquivo) await del('midia', oc.id + '/' + r.arquivo);
  await del('ocorrencias', oc.id);
  oc = null; selTipo = null; selFuncao = null;
  $('tela-cockpit').hidden = true; $('tela-setup').hidden = false;
  $('estado-app').textContent = 'pronto';
  renderSetup(); renderHist();
};

/* ================= boot: retoma ocorrência aberta ================= */
if ('serviceWorker' in navigator && window.isSecureContext) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
(async () => {
  if (!window.isSecureContext) $('estado-app').textContent = '⚠️ sem HTTPS';
  db = await abrirDB();
  const abertas = (await getAll('ocorrencias')).filter(o => !o.concluida);
  if (abertas.length) { oc = abertas[abertas.length-1]; mostrarCockpit(); }
  else renderSetup();
  renderHist();
})();
</script>
